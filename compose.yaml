services:
  postgres:
    image: postgres:16-alpine
    container_name: fairplay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fairplay
      POSTGRES_USER: fairplay
      POSTGRES_PASSWORD: fairplay_local_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairplay -d fairplay"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - fairplay-postgres-data:/var/lib/postgresql/data

volumes:
  fairplay-postgres-data:
